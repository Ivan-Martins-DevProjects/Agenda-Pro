<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendamento de Serviços</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .btn-open {
      padding: 10px 20px;
      background-color: #4f46e5;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
    }

    .appointment-detail-modal {
      border: none;
      border-radius: 12px;
      width: 90%;
      max-width: 600px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      padding: 0;
    }

    .appointment-detail-modal::backdrop {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(2px);
    }

    .appointment-detail-container {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .appointment-detail-header {
      background-color: #f9fafb;
      padding: 1.5rem;
      border-bottom: 1px solid #e5e7eb;
      border-radius: 12px 12px 0 0;
    }

    .detail-header-title h2 {
      margin: 0;
      color: #111827;
      font-size: 1.25rem;
    }

    .appointment-detail-body {
      padding: 1.5rem;
      overflow-y: auto;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.2rem;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid #f3f4f6;
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      font-weight: 600;
      color: #6b7280;
      min-width: 100px;
    }

    .detail-value {
      color: #1f2937;
      flex-grow: 1;
      text-align: right;
    }

    .detail-input,
    .detail-select,
    .detail-textarea {
      display: none;
      width: 100%;
      padding: 0.5rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.95rem;
      text-align: left;
      margin-left: auto;
      max-width: 60%;
    }

    .detail-textarea {
      resize: vertical;
      min-height: 60px;
    }

    .appointment-detail-footer {
      padding: 1rem 1.5rem;
      background-color: #f9fafb;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      border-radius: 0 0 12px 12px;
    }

    button {
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      border: 1px solid transparent;
    }

    .appointment-detail-close {
      background-color: white;
      border-color: #d1d5db;
      color: #374151;
    }

    .appointment-detail-edit {
      background-color: #4f46e5;
      color: white;
    }

    .appointment-detail-close:hover {
      background-color: #f3f4f6;
    }

    .appointment-detail-edit:hover {
      background-color: #4338ca;
    }

    .appointment-detail-modal.is-editing .detail-value {
      display: none;
    }

    .appointment-detail-modal.is-editing .detail-input,
    .appointment-detail-modal.is-editing .detail-select,
    .appointment-detail-modal.is-editing .detail-textarea {
      display: block;
    }

    .appointment-detail-modal.is-editing .detail-row {
      flex-wrap: wrap;
    }
  </style>
</head>

<body>
  <button class="btn btn-open">Abrir Agendamento</button>

  <dialog class="appointment-detail-modal">
    <div class="appointment-detail-container">
      <div class="appointment-detail-header">
        <div class="detail-header-title">
          <h2>Detalhes do Agendamento</h2>
        </div>
      </div>

      <div class="appointment-detail-body">
        <div class="detail-row">
          <span class="detail-label">Cliente:</span>
          <span class="detail-value">Ivan Martins</span>
          <input type="text" class="detail-input" value="Ivan Martins" disabled>
        </div>

        <div class="detail-row">
          <span class="detail-label">Serviço:</span>
          <span class="detail-value">Coloração</span>
          <input type="text" class="detail-input" value="Coloração">
        </div>

        <div class="detail-row">
          <span class="detail-label">Data:</span>
          <span class="detail-value">12 de Outubro, 2023</span>
          <input type="date" class="detail-input" value="2023-10-12">
        </div>

        <div class="detail-row">
          <span class="detail-label">Hora:</span>
          <span class="detail-value">12:00</span>
          <input type="time" class="detail-input" value="12:00">
        </div>

        <div class="detail-row">
          <span class="detail-label">Preço:</span>
          <span class="detail-value">R$50,00</span>
          <input type="text" class="detail-input" value="50,00">
        </div>

        <div class="detail-row">
          <span class="detail-label">Status:</span>
          <span class="detail-value">Confirmado</span>
          <select class="detail-select">
            <option value="Confirmado" selected>Confirmado</option>
            <option value="Pendente">Pendente</option>
            <option value="Cancelado">Cancelado</option>
          </select>
        </div>

        <div class="detail-row" style="align-items: flex-start;">
          <span class="detail-label">Obs:</span>
          <span class="detail-value">Prefere procedimento sem amônia</span>
          <textarea class="detail-textarea">Prefere procedimento sem amônia</textarea>
        </div>
      </div>

      <div class="appointment-detail-footer">
        <button class="appointment-detail-close">Fechar</button>
        <button class="appointment-detail-edit">Editar</button>
      </div>
    </div>
  </dialog>

  <script>
  </script>
</body>

</html>
